<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>1-bit Floating Amoeba - Relaxation Edition</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			overflow: hidden;
			user-select: none;
			-webkit-user-select: none;
			touch-action: none;
		}

		body,
		html {
			width: 100%;
			height: 100%;
			background-color: #000000;
			position: relative;
			cursor: grab;
		}

		body:active {
			cursor: grabbing;
		}

		canvas {
			position: absolute;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: transparent;
			/* ドット感をなくし、ブラウザのバイリニア補間を活かして滑らかに拡大します */
			image-rendering: auto;
			filter: url(#smooth-one-bit);
		}

		#hint {
			position: absolute;
			bottom: 40px;
			left: 50%;
			transform: translateX(-50%);
			color: rgba(255, 255, 255, 0.22); /* 目に優しい暗めの配色 */
			font-family: monospace;
			font-size: 10px;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			pointer-events: none;
			z-index: 10;
			transition: opacity 1.2s ease;
			text-align: center;
			line-height: 1.8;
			width: 90%;
		}
	</style>
</head>

<body>

	<div id="hint">
		FLOATING AMY: RELAXATION<br>
		<span style="font-size: 8px; opacity: 0.65;">
			画面を優しくタッチして、音と流体のゆらぎをお楽しみください
		</span>
	</div>

	<canvas id="canvas"></canvas>

	<!-- 目に優しく、完璧にアンチエイリアスの効いた滑らかな輪郭線を生成するSVGフィルタ -->
	<svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
		<defs>
			<filter id="smooth-one-bit" x="-20%" y="-20%" width="140%" height="140%">
				<!-- ぼかし量を調整し、滑らかなとろみと細さを両立します -->
				<feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />

				<!-- type="table" を用い、境界の両端に極めて緩やかなグラデーションを残してジャギーを防ぎます -->
				<feComponentTransfer in="blur" result="outline">
					<feFuncA type="table" tableValues="
                    0 0 0 0 0 0 0 0.05 0.75 1.0 0.75 0.05 0 0 0 0 0 0" />
				</feComponentTransfer>

				<!-- 輪郭を白黒の目に刺さらない柔らかい輝度へマッピング -->
				<feColorMatrix type="matrix" values="
                0 0 0 0 0.95
                0 0 0 0 0.95
                0 0 0 0 0.95
                0 0 0 1 0" in="outline" />
			</filter>
		</defs>
	</svg>

	<script>
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext('2d', { alpha: false });

		// ==================================================
		// AUDIO SYSTEM (Web Audio API Synthesis)
		// ==================================================

		let audioCtx = null;
		let initializedAudio = false;

		// ノード参照用
		let droneFilter = null;
		let droneGain = null;
		let flowSource = null;
		let flowFilter = null;
		let flowGain = null;

		// ブラウンノイズバッファ生成（深海底流用）
		function createBrownNoiseBuffer() {
			const sampleRate = audioCtx.sampleRate;
			const bufferSize = sampleRate * 4; // 4秒分のループ波形
			const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
			const data = buffer.getChannelData(0);
			let lastOut = 0.0;

			for (let i = 0; i < bufferSize; i++) {
				const white = Math.random() * 2 - 1;
				// 積分フィルタによるブラウンノイズ生成
				data[i] = (lastOut + (0.02 * white)) / 1.02;
				lastOut = data[i];
				data[i] *= 4.0; // 音量ゲインの補正
			}
			return buffer;
		}

		// ピンクノイズバッファ生成（指による水流ASMR用）
		function createPinkNoiseBuffer() {
			const sampleRate = audioCtx.sampleRate;
			const bufferSize = sampleRate * 4;
			const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
			const data = buffer.getChannelData(0);
			let b0, b1, b2, b3, b4, b5, b6;
			b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;

			for (let i = 0; i < bufferSize; i++) {
				const white = Math.random() * 2 - 1;
				b0 = 0.99886 * b0 + white * 0.0555179;
				b1 = 0.99332 * b1 + white * 0.0750759;
				b2 = 0.96900 * b2 + white * 0.1538520;
				b3 = 0.86650 * b3 + white * 0.3104856;
				b4 = 0.55000 * b4 + white * 0.5329522;
				b5 = -0.7616 * b5 - white * 0.0168980;
				data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
				data[i] *= 0.11;
				b6 = white * 0.115926;
			}
			return buffer;
		}

		// 音響システムの初期化
		function initAudio() {
			if (initializedAudio) return;
			initializedAudio = true;

			const AudioContextClass = window.AudioContext || window.webkitAudioContext;
			audioCtx = new AudioContextClass();

			setupDeepSeaDrone();
			setupWaterFlowSound();
		}

		// タッチ時のオーディオ制限解除
		function ensureAudioPlay() {
			if (!audioCtx) {
				initAudio();
			}
			if (audioCtx && audioCtx.state === 'suspended') {
				audioCtx.resume();
			}
		}

		// 1. 深海底流ドローンの構築
		function setupDeepSeaDrone() {
			const noiseSource = audioCtx.createBufferSource();
			noiseSource.buffer = createBrownNoiseBuffer();
			noiseSource.loop = true;

			// 低周波サイン波による深い和音 (A1=55Hz ＆ E2=82.5Hz)
			const osc1 = audioCtx.createOscillator();
			const osc2 = audioCtx.createOscillator();
			osc1.frequency.value = 55.0;
			osc2.frequency.value = 82.5;
			osc1.type = 'sine';
			osc2.type = 'sine';

			const oscGain1 = audioCtx.createGain();
			const oscGain2 = audioCtx.createGain();
			oscGain1.gain.value = 0.04; // 非常に微弱に鳴らす
			oscGain2.gain.value = 0.02;
			osc1.connect(oscGain1);
			osc2.connect(oscGain2);

			// ローパスフィルタで高音を丸める
			droneFilter = audioCtx.createBiquadFilter();
			droneFilter.type = 'lowpass';
			droneFilter.frequency.value = 140;

			// フェードイン用のゲインノード
			droneGain = audioCtx.createGain();
			droneGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
			// 4秒かけてゆっくりフェードイン
			droneGain.gain.exponentialRampToValueAtTime(0.24, audioCtx.currentTime + 4.0);

			noiseSource.connect(droneFilter);
			oscGain1.connect(droneFilter);
			oscGain2.connect(droneFilter);
			droneFilter.connect(droneGain);
			droneGain.connect(audioCtx.destination);

			// ドローン用超低速LFO（約66秒サイクルでフィルタの遮断周波数を穏やかに揺らし、潮の満ち引きを表現）
			const lfo = audioCtx.createOscillator();
			const lfoGain = audioCtx.createGain();
			lfo.frequency.value = 0.015;
			lfoGain.gain.value = 40; // 変動幅 ±40Hz

			lfo.connect(lfoGain);
			lfoGain.connect(droneFilter.frequency);

			noiseSource.start(0);
			osc1.start(0);
			osc2.start(0);
			lfo.start(0);
		}

		// 2. 指の動きに同期する水流音の構築
		function setupWaterFlowSound() {
			flowSource = audioCtx.createBufferSource();
			flowSource.buffer = createPinkNoiseBuffer();
			flowSource.loop = true;

			// バンドパスフィルタで液体のうねり音を作る
			flowFilter = audioCtx.createBiquadFilter();
			flowFilter.type = 'bandpass';
			flowFilter.Q.value = 1.8;
			flowFilter.frequency.value = 120;

			flowGain = audioCtx.createGain();
			flowGain.gain.value = 0.001; // 最初は消音

			flowSource.connect(flowFilter);
			flowFilter.connect(flowGain);
			flowGain.connect(audioCtx.destination);

			flowSource.start(0);
		}

		function updateWaterFlowSound(speed) {
			if (!flowGain || !audioCtx) return;

			// 速度に緩やかに同期させて周波数と音量をイージング移動
			const targetFreq = 120 + Math.min(speed * 280, 160);
			const targetVolume = Math.min(speed * 0.14, 0.035); // ささやかな音量範囲

			flowFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.12);
			flowGain.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.20);
		}

		// 3. 水泡（Bubble）シンセシスとステレオパンニング
		function playBubbleSound(xRatio) {
			if (!audioCtx || audioCtx.state === 'suspended') return;

			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			const filter = audioCtx.createBiquadFilter();
			const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

			// リラックスに配慮したマイルドな低い周波数からのスイープ
			const baseFreq = 75 + Math.random() * 55;
			const endFreq = baseFreq * (1.6 + Math.random() * 0.3);
			const duration = 0.10 + Math.random() * 0.06;

			osc.type = 'sine';
			osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
			// 周波数の指数関数的な上昇（コポッという音響特性）
			osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);

			// 音量エンベロープ
			gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
			gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.006);
			gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

			// 耳障りな高音のトゲを排除する低周波ローパス
			filter.type = 'lowpass';
			filter.frequency.value = 260;

			osc.connect(gain);
			gain.connect(filter);

			let dest = audioCtx.destination;
			if (panner) {
				// 画面上のX座標に応じたステレオ定位
				const pan = (xRatio * 2 - 1) * 0.8;
				panner.pan.setValueAtTime(pan, audioCtx.currentTime);
				filter.connect(panner);
				panner.connect(dest);
			} else {
				filter.connect(dest);
			}

			osc.start();
			osc.stop(audioCtx.currentTime + duration + 0.05);
		}

		// 水泡音のトリガースロットリング（音が重なりすぎてリラックスを損なうのを防ぎます）
		let lastBubbleTime = 0;
		function triggerAmebaBubble(xRatio) {
			const now = Date.now();
			if (now - lastBubbleTime > 250) { // 最低250msの間隔
				lastBubbleTime = now;
				playBubbleSound(xRatio);
			}
		}

		// ==================================================
		// CONFIG
		// ==================================================

		// 640px高ベース。高解像度でのスムーズな補間と滑らかな挙動を両立します。
		const BASE_HEIGHT = 640;

		let VIEW_WIDTH = 360;
		let VIEW_HEIGHT = BASE_HEIGHT;

		const pointer = {
			x: -1000,
			y: -1000,
			active: false,

			vx: 0,
			vy: 0,
			lastX: 0,
			lastY: 0,

			radius: 28, // 影響範囲を過度に広げずマイルドに
			visualRadius: 0,
			visualTargetRadius: 28
		};

		// タッチを離したあとに残る、静寂な熱源（力場）
		const forceFields = [];

		class ForceField {
			constructor(x, y, vx, vy) {
				this.x = x;
				this.y = y;

				// 指を離した時の流れを大幅に減衰させてマイルドに継承
				this.vx = vx * 0.3;
				this.vy = vy * 0.3;

				// 物理的な寿命（ゆっくりとフェードアウト）
				this.life = 1.0;
				this.decay = 0.010; // 約3.3秒かけてゆっくり消滅

				this.radius = 65;
				this.maxRadius = 110;

				// 中心へ引き寄せる力（ユーザーの注意を惹かないよう極めて緩やかに）
				this.pullStrength = 0.025;
				this.flowStrength = 0.006;

				// 視覚的な残響（ゆっくり溶け出す熱源のフェードアウト）
				this.visualLife = 1.0;
				this.visualDecay = 0.015;

				this.visualRadius = 18;
				this.visualMaxRadius = 80;
			}

			update() {
				this.life -= this.decay;
				this.visualLife -= this.visualDecay;

				this.radius += (this.maxRadius - this.radius) * 0.015;
				this.visualRadius += (this.visualMaxRadius - this.visualRadius) * 0.04;
			}

			applyTo(blob) {
				if (this.life <= 0) return;

				const dx = this.x - blob.x;
				const dy = this.y - blob.y;
				const dist = Math.hypot(dx, dy);

				if (dist <= 0 || dist > this.radius) return;

				const pct = 1 - dist / this.radius;
				const ease = pct * pct * (3 - 2 * pct);
				const power = ease * this.life;

				blob.vx += (dx / dist) * this.pullStrength * power;
				blob.vy += (dy / dist) * this.pullStrength * power;

				blob.vx += this.vx * this.flowStrength * power;
				blob.vy += this.vy * this.flowStrength * power;
			}

			draw(context) {
				if (this.visualLife <= 0) return;

				const life = Math.max(0, this.visualLife);

				context.save();

				// ラジアルグラデーションによる柔らかい熱溜まり
				const grad = context.createRadialGradient(
					this.x, this.y, 0,
					this.x, this.y, this.visualRadius
				);
				grad.addColorStop(0, `rgba(255, 255, 255, ${life * 0.85})`);
				grad.addColorStop(0.5, `rgba(255, 255, 255, ${life * 0.40})`);
				grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

				context.beginPath();
				context.arc(this.x, this.y, this.visualRadius, 0, Math.PI * 2);
				context.fillStyle = grad;
				context.fill();

				context.restore();
			}

			get alive() {
				return this.life > 0 || this.visualLife > 0;
			}
		}

		class Amoeba {
			constructor(x, y, r) {
				this.x = x;
				this.y = y;

				this.baseR = r;
				this.r = r;

				const initialAngle = Math.random() * Math.PI * 2;
				const initialSpeed = 0.05 + Math.random() * 0.05;

				this.vx = Math.cos(initialAngle) * initialSpeed;
				this.vy = Math.sin(initialAngle) * initialSpeed;

				this.wanderAngle = initialAngle;
				this.currentAngle = initialAngle;

				this.time = Math.random() * 100;
				this.pulseSpeed = 0.006 + Math.random() * 0.008;

				this.numPoints = Math.max(12, Math.floor(r * 0.6));

				// 他のアメーバとの接触履歴（結合・ちぎれASMRトリガー検出用）
				this.nearBlobStates = new Map();
			}

			update() {
				this.time += this.pulseSpeed;

				this.wanderAngle += (Math.random() - 0.5) * 0.05;

				const driftForce = 0.004;
				this.vx += Math.cos(this.wanderAngle) * driftForce;
				this.vy += Math.sin(this.wanderAngle) * driftForce;

				// --- 近接時の融合・膨張ロジック ＆ 結合・ちぎれイベント検出 ---
				let targetR = this.baseR;
				let maxExpansion = 0;

				blobs.forEach(other => {
					if (other === this) return;

					const dx = other.x - this.x;
					const dy = other.y - this.y;
					const dist = Math.hypot(dx, dy);
					const combineRange = (this.baseR + other.baseR) * 1.5;

					if (dist < combineRange) {
						const overlap = Math.max(0, 1 - (dist / combineRange));
						const expansion = Math.pow(overlap, 1.4) * 0.30 * this.baseR;

						if (expansion > maxExpansion) {
							maxExpansion = expansion;
						}
					}

					// 結合・分裂の判定（融合しきい値を1.35倍に設定）
					const contactRange = (this.baseR + other.baseR) * 1.35;
					const wasNear = this.nearBlobStates.get(other) || false;
					const isNear = dist < contactRange;

					if (isNear !== wasNear) {
						this.nearBlobStates.set(other, isNear);
						// 重複トリガーを防ぐため、インデックスの小さいAmoebaのみで音声をトリガー
						if (blobs.indexOf(this) < blobs.indexOf(other)) {
							triggerAmebaBubble(this.x / VIEW_WIDTH);
						}
					}
				});

				targetR += maxExpansion;
				this.r += (targetR - this.r) * 0.06;

				// --- 指への緩やかな吸い付き ---
				let currentFriction = 0.965;
				let isBeingPulled = false;

				if (pointer.active) {
					const dx = pointer.x - this.x;
					const dy = pointer.y - this.y;
					const dist = Math.hypot(dx, dy);
					const pullRange = pointer.radius * 3.0;

					if (dist < pullRange) {
						isBeingPulled = true;

						const pct = Math.max(0, 1 - dist / pullRange);

						if (dist > 1) {
							const pullForce = Math.pow(pct, 2) * 0.22;
							this.vx += (dx / dist) * pullForce;
							this.vy += (dy / dist) * pullForce;
						}

						currentFriction = 0.965 - (pct * 0.24);
					}
				}

				forceFields.forEach(field => {
					field.applyTo(this);
				});

				this.vx *= currentFriction;
				this.vy *= currentFriction;

				const currentSpeed = Math.hypot(this.vx, this.vy);

				if (!isBeingPulled) {
					const minSpeed = 0.02;
					const maxSpeed = 0.16;

					if (currentSpeed < minSpeed && currentSpeed > 0) {
						this.vx = (this.vx / currentSpeed) * minSpeed;
						this.vy = (this.vy / currentSpeed) * minSpeed;
					} else if (currentSpeed > maxSpeed) {
						this.vx *= 0.90;
						this.vy *= 0.90;
					}
				}

				this.x += this.vx;
				this.y += this.vy;

				// --- 境界回避 ---
				const margin = this.r * 0.5;
				const edgeBuffer = 35;
				const wallForce = 0.008;

				if (this.x < margin + edgeBuffer) this.vx += wallForce;
				if (this.x > VIEW_WIDTH - margin - edgeBuffer) this.vx -= wallForce;
				if (this.y < margin + edgeBuffer) this.vy += wallForce;
				if (this.y > VIEW_HEIGHT - margin - edgeBuffer) this.vy -= wallForce;

				if (this.x < margin) {
					this.x = margin;
					this.vx *= -0.2;
				}
				if (this.x > VIEW_WIDTH - margin) {
					this.x = VIEW_WIDTH - margin;
					this.vx *= -0.2;
				}
				if (this.y < margin) {
					this.y = margin;
					this.vy *= -0.2;
				}
				if (this.y > VIEW_HEIGHT - margin) {
					this.y = VIEW_HEIGHT - margin;
					this.vy *= -0.2;
				}
			}

			drawShape(context) {
				if (this.numPoints < 3) return;

				const points = [];
				for (let i = 0; i < this.numPoints; i++) {
					const angle = (i / this.numPoints) * Math.PI * 2;

					const pulse = Math.sin(this.time * 1.0 + angle * 3) * 0.04;
					const wave = Math.cos(this.time * 0.4 - angle * 2) * 0.03;
					const currentVertexR = this.r * (1 + pulse + wave);

					points.push({
						x: this.x + Math.cos(angle) * currentVertexR,
						y: this.y + Math.sin(angle) * currentVertexR
					});
				}

				context.beginPath();
				let xc = (points[0].x + points[1].x) / 2;
				let yc = (points[0].y + points[1].y) / 2;
				context.moveTo(xc, yc);

				for (let i = 1; i < this.numPoints - 1; i++) {
					xc = (points[i].x + points[i+1].x) / 2;
					yc = (points[i].y + points[i+1].y) / 2;
					context.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
				}

				xc = (points[this.numPoints - 1].x + points[0].x) / 2;
				yc = (points[this.numPoints - 1].y + points[0].y) / 2;
				context.quadraticCurveTo(points[this.numPoints - 1].x, points[this.numPoints - 1].y, xc, yc);

				const firstMidX = (points[0].x + points[1].x) / 2;
				const firstMidY = (points[0].y + points[1].y) / 2;
				context.quadraticCurveTo(points[0].x, points[0].y, firstMidX, firstMidY);

				context.closePath();
				context.fill();
			}
		}

		// アメーバ生成
		const blobs = [];
		const numBlobs = 14;

		for (let i = 0; i < numBlobs; i++) {
			const r = 18 + Math.pow(Math.random(), 1.5) * 32;
			const x = r + Math.random() * (VIEW_WIDTH - r * 2);
			const y = r + Math.random() * (VIEW_HEIGHT - r * 2);

			blobs.push(new Amoeba(x, y, r));
		}

		function clampBlobsToView() {
			blobs.forEach(blob => {
				const margin = blob.r * 0.4;

				blob.x = Math.max(margin, Math.min(VIEW_WIDTH - margin, blob.x));
				blob.y = Math.max(margin, Math.min(VIEW_HEIGHT - margin, blob.y));
			});
		}

		window.addEventListener('resize', () => {
			resizeCanvas();
			clampBlobsToView();
		});

		function draw() {
			ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

			ctx.fillStyle = '#ffffff';
			forceFields.forEach(field => {
				field.draw(ctx);
			});

			blobs.forEach(blob => {
				blob.drawShape(ctx);
			});

			if (pointer.active || pointer.visualRadius > 0.5) {
				ctx.save();
				const grad = ctx.createRadialGradient(
					pointer.x, pointer.y, 0,
					pointer.x, pointer.y, pointer.visualRadius
				);
				const alpha = pointer.active ? 0.85 : (pointer.visualRadius / pointer.visualTargetRadius) * 0.85;
				grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
				grad.addColorStop(0.5, `rgba(255, 255, 255, ${alpha * 0.45})`);
				grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

				ctx.beginPath();
				ctx.arc(pointer.x, pointer.y, pointer.visualRadius, 0, Math.PI * 2);
				ctx.fillStyle = grad;
				ctx.fill();
				ctx.restore();
			}
		}

		function update() {
			if (pointer.active) {
				pointer.vx = pointer.x - pointer.lastX;
				pointer.vy = pointer.y - pointer.lastY;
				pointer.lastX = pointer.x;
				pointer.lastY = pointer.y;

				// 指の移動速度を水流 ASMR に反映
				const speed = Math.hypot(pointer.vx, pointer.vy);
				updateWaterFlowSound(speed);
			} else {
				updateWaterFlowSound(0);
			}

			if (pointer.active) {
				pointer.visualRadius += (pointer.visualTargetRadius - pointer.visualRadius) * 0.10;
			} else {
				pointer.visualRadius += (0 - pointer.visualRadius) * 0.08;
			}

			for (let i = forceFields.length - 1; i >= 0; i--) {
				forceFields[i].update();

				if (!forceFields[i].alive) {
					forceFields.splice(i, 1);
				}
			}

			blobs.forEach(blob => blob.update());
		}

		function loop(timestamp) {
			requestAnimationFrame(loop);

			if (timestamp - lastFrameTime < FRAME_INTERVAL) return;
			lastFrameTime = timestamp;

			update();
			draw();
		}

		function getPointerPos(e) {
			return {
				x: e.clientX * (VIEW_WIDTH / window.innerWidth),
				y: e.clientY * (VIEW_HEIGHT / window.innerHeight)
			};
		}

		canvas.addEventListener('pointerdown', (e) => {
			canvas.setPointerCapture(e.pointerId);

			pointer.active = true;

			const pos = getPointerPos(e);
			pointer.x = pos.x;
			pointer.y = pos.y;
			pointer.lastX = pos.x;
			pointer.lastY = pos.y;
			pointer.vx = 0;
			pointer.vy = 0;

			pointer.visualRadius = 0;

			// オーディオの制限解除とフェードイン起動
			ensureAudioPlay();

			// タッチ開始時の水泡トリガー
			triggerAmebaBubble(pos.x / VIEW_WIDTH);

			const hint = document.getElementById('hint');
			if (hint) hint.style.opacity = '0';
		});

		canvas.addEventListener('pointermove', (e) => {
			if (!pointer.active) return;

			// タッチ中にオーディオがサスペンドされていた場合は復帰
			ensureAudioPlay();

			const pos = getPointerPos(e);
			pointer.x = pos.x;
			pointer.y = pos.y;
		});

		canvas.addEventListener('pointerup', (e) => {
			if (!pointer.active) return;

			pointer.active = false;
			canvas.releasePointerCapture(e.pointerId);

			blobs.forEach(blob => {
				const dx = pointer.x - blob.x;
				const dy = pointer.y - blob.y;
				const dist = Math.hypot(dx, dy);

				if (dist < pointer.radius * 2.5) {
					const influence = 1 - dist / (pointer.radius * 2.5);

					blob.vx += pointer.vx * influence * 0.15;
					blob.vy += pointer.vy * influence * 0.15;
				}
			});

			forceFields.push(new ForceField(pointer.x, pointer.y, pointer.vx, pointer.vy));

			if (forceFields.length > 5) {
				forceFields.shift();
			}

			// 指を離した瞬間の水泡トリガー
			triggerAmebaBubble(pointer.x / VIEW_WIDTH);
		});

		canvas.addEventListener('pointercancel', () => {
			pointer.active = false;

			forceFields.push(new ForceField(pointer.x, pointer.y, pointer.vx, pointer.vy));

			if (forceFields.length > 5) {
				forceFields.shift();
			}
		});

		requestAnimationFrame(loop);

		setTimeout(() => {
			const hint = document.getElementById('hint');
			if (hint) hint.style.opacity = '0';
		}, 5000);
	</script>
</body>

</html>
