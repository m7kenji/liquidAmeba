<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>1-bit Floating Amoeba - Relaxation Edition</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			overflow: hidden;
			user-select: none;
			-webkit-user-select: none;
			touch-action: none;
		}

		body,
		html {
			width: 100%;
			height: 100%;
			background-color: #000000;
			position: relative;
			cursor: grab;
		}

		body:active {
			cursor: grabbing;
		}

		canvas {
			position: absolute;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: transparent;
			/* ドット感をなくし、ブラウザのバイリニア補間を活かして滑らかに拡大します */
			image-rendering: auto;
			filter: url(#smooth-one-bit);
		}

		#hint {
			position: absolute;
			bottom: 40px;
			left: 50%;
			transform: translateX(-50%);
			color: rgba(255, 255, 255, 0.22); /* 目に優しい暗めの配色 */
			font-family: monospace;
			font-size: 10px;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			pointer-events: none;
			z-index: 10;
			transition: opacity 1.2s ease;
			text-align: center;
			line-height: 1.8;
			width: 90%;
		}
	</style>
</head>

<body>

	<div id="hint">
		FLOATING AMY: RELAXATION<br>
		<span style="font-size: 8px; opacity: 0.65;">
			深海のように穏やかに揺蕩い、溶け合う流体
		</span>
	</div>

	<canvas id="canvas"></canvas>

	<!-- 目に優しく、完璧にアンチエイリアスの効いた滑らかな輪郭線を生成するSVGフィルタ -->
	<svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
		<defs>
			<filter id="smooth-one-bit" x="-20%" y="-20%" width="140%" height="140%">
				<!-- ぼかし量を調整し、滑らかなとろみと細さを両立します -->
				<feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />

				<!-- 閾値テーブルの幅を狭めることで、アンチエイリアスを効かせたまま細い輪郭線にします -->
				<feComponentTransfer in="blur" result="outline">
					<feFuncA type="table" tableValues="
                    0 0 0 0 0 0 0 0.05 0.75 1.0 0.75 0.05 0 0 0 0 0 0" />
				</feComponentTransfer>

				<!-- 輪郭を白黒の目に刺さらない柔らかい輝度へマッピング -->
				<feColorMatrix type="matrix" values="
                0 0 0 0 0.95
                0 0 0 0 0.95
                0 0 0 0 0.95
                0 0 0 1 0" in="outline" />
			</filter>
		</defs>
	</svg>

	<script>
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext('2d');

		// 640px高ベース。高解像度でのスムーズな補間と滑らかな挙動を両立します。
		const BASE_HEIGHT = 640;

		let VIEW_WIDTH = 360;
		let VIEW_HEIGHT = BASE_HEIGHT;

		function resizeCanvas() {
			const aspect = window.innerWidth / window.innerHeight;

			VIEW_HEIGHT = BASE_HEIGHT;
			VIEW_WIDTH = Math.round(BASE_HEIGHT * aspect);

			canvas.width = VIEW_WIDTH;
			canvas.height = VIEW_HEIGHT;
		}

		resizeCanvas();

		const pointer = {
			x: -1000,
			y: -1000,
			active: false,

			vx: 0,
			vy: 0,
			lastX: 0,
			lastY: 0,

			radius: 28, // 影響範囲を過度に広げずマイルドに

			// 出現時の急激な変化を防ぐためのイージング用半径
			visualRadius: 0,
			visualTargetRadius: 28
		};

		// タッチを離したあとに残る、静寂な熱源（力場）
		const forceFields = [];

		class ForceField {
			constructor(x, y, vx, vy) {
				this.x = x;
				this.y = y;

				// 指を離した時の流れを大幅に減衰させてマイルドに継承
				this.vx = vx * 0.3;
				this.vy = vy * 0.3;

				// 物理的な寿命（ゆっくりとフェードアウト）
				this.life = 1.0;
				this.decay = 0.010; // 約3.3秒かけてゆっくり消滅

				this.radius = 65;
				this.maxRadius = 110;

				// 中心へ引き寄せる力（ユーザーの注意を惹かないよう極めて緩やかに）
				this.pullStrength = 0.025;
				this.flowStrength = 0.006;

				// 視覚的な残響（波紋リングではなく、ぬるりと溶け出す熱源のフェードアウト）
				this.visualLife = 1.0;
				this.visualDecay = 0.015;

				this.visualRadius = 18;
				this.visualMaxRadius = 80;
			}

			update() {
				this.life -= this.decay;
				this.visualLife -= this.visualDecay;

				// 力場は極めてゆっくりと広がる
				this.radius += (this.maxRadius - this.radius) * 0.015;
				this.visualRadius += (this.visualMaxRadius - this.visualRadius) * 0.04;
			}

			applyTo(blob) {
				if (this.life <= 0) return;

				const dx = this.x - blob.x;
				const dy = this.y - blob.y;
				const dist = Math.hypot(dx, dy);

				if (dist <= 0 || dist > this.radius) return;

				const pct = 1 - dist / this.radius;
				const ease = pct * pct * (3 - 2 * pct); // スムーズな力場勾配
				const power = ease * this.life;

				// 緩やかな吸引と流れの継承
				blob.vx += (dx / dist) * this.pullStrength * power;
				blob.vy += (dy / dist) * this.pullStrength * power;

				blob.vx += this.vx * this.flowStrength * power;
				blob.vy += this.vy * this.flowStrength * power;
			}

			draw(context) {
				if (this.visualLife <= 0) return;

				const life = Math.max(0, this.visualLife);

				context.save();

				// グラデーションの不透明度を上げ、SVGフィルタ経由で「溶けるワイヤー」が可視化されるようにします
				const grad = context.createRadialGradient(
					this.x, this.y, 0,
					this.x, this.y, this.visualRadius
				);
				grad.addColorStop(0, `rgba(255, 255, 255, ${life * 0.85})`);
				grad.addColorStop(0.5, `rgba(255, 255, 255, ${life * 0.40})`);
				grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

				context.beginPath();
				context.arc(this.x, this.y, this.visualRadius, 0, Math.PI * 2);
				context.fillStyle = grad;
				context.fill();

				context.restore();
			}

			get alive() {
				return this.life > 0 || this.visualLife > 0;
			}
		}

		class Amoeba {
			constructor(x, y, r) {
				this.x = x;
				this.y = y;

				this.baseR = r;
				this.r = r;

				const initialAngle = Math.random() * Math.PI * 2;
				const initialSpeed = 0.05 + Math.random() * 0.05; // 動きを極めて遅く

				this.vx = Math.cos(initialAngle) * initialSpeed;
				this.vy = Math.sin(initialAngle) * initialSpeed;

				this.wanderAngle = initialAngle;
				this.currentAngle = initialAngle; // スムーズな角度遷移用の補間

				this.time = Math.random() * 100;
				this.pulseSpeed = 0.006 + Math.random() * 0.008; // 呼吸リズムを非常に遅く

				this.numPoints = Math.max(12, Math.floor(r * 0.6)); // 滑らかなベジェ曲線のために頂点数をやや増加
			}

			update() {
				this.time += this.pulseSpeed;

				// --- 1. 自律的なふわふわ漂流 (方向変化を大幅にマイルドに) ---
				this.wanderAngle += (Math.random() - 0.5) * 0.05;

				const driftForce = 0.004; // ドリフト力を弱く
				this.vx += Math.cos(this.wanderAngle) * driftForce;
				this.vy += Math.sin(this.wanderAngle) * driftForce;

				// --- 2. 近接時の融合・膨張ロジック ---
				let targetR = this.baseR;
				let maxExpansion = 0;

				blobs.forEach(other => {
					if (other === this) return;

					const dx = other.x - this.x;
					const dy = other.y - this.y;
					const dist = Math.hypot(dx, dy);
					const combineRange = (this.baseR + other.baseR) * 1.5;

					if (dist < combineRange) {
						const overlap = 1 - (dist / combineRange);
						const expansion = Math.pow(overlap, 1.4) * 0.30 * this.baseR;

						if (expansion > maxExpansion) {
							maxExpansion = expansion;
						}
					}
				});

				targetR += maxExpansion;
				// ゆっくりと融合・分離時の半径を追従させ、粘性ととろみを強調
				this.r += (targetR - this.r) * 0.06;

				// --- 3. 指への緩やかな吸い付き ---
				let currentFriction = 0.965; // 慣性を残してマイルドにするため摩擦を軽減
				let isBeingPulled = false;

				if (pointer.active) {
					const dx = pointer.x - this.x;
					const dy = pointer.y - this.y;
					const dist = Math.hypot(dx, dy);
					const pullRange = pointer.radius * 3.0;

					if (dist < pullRange) {
						isBeingPulled = true;

						const pct = 1 - dist / pullRange;

						if (dist > 1) {
							// 吸引力を大幅に落とし、ぬるぬると引き寄せられるように
							const pullForce = Math.pow(pct, 2) * 0.22;
							this.vx += (dx / dist) * pullForce;
							this.vy += (dy / dist) * pullForce;
						}

						// 中心付近の急な震えを抑えるブレーキ
						currentFriction = 0.965 - (pct * 0.24);
					}
				}

				// --- 3.5. 指を離したあとの力場 ---
				forceFields.forEach(field => {
					field.applyTo(this);
				});

				// 空間抵抗の適用
				this.vx *= currentFriction;
				this.vy *= currentFriction;

				// --- 4. 速度レンジの制御 (ラバランプ的に超低速化) ---
				const currentSpeed = Math.hypot(this.vx, this.vy);

				if (!isBeingPulled) {
					const minSpeed = 0.02;
					const maxSpeed = 0.16;

					if (currentSpeed < minSpeed && currentSpeed > 0) {
						this.vx = (this.vx / currentSpeed) * minSpeed;
						this.vy = (this.vy / currentSpeed) * minSpeed;
					} else if (currentSpeed > maxSpeed) {
						this.vx *= 0.90;
						this.vy *= 0.90;
					}
				}

				this.x += this.vx;
				this.y += this.vy;

				// --- 5. 境界回避 (反射ではなく、境界力場による滑らかな旋回) ---
				const margin = this.r * 0.5;
				const edgeBuffer = 35;
				const wallForce = 0.008;

				if (this.x < margin + edgeBuffer) {
					this.vx += wallForce;
				}
				if (this.x > VIEW_WIDTH - margin - edgeBuffer) {
					this.vx -= wallForce;
				}
				if (this.y < margin + edgeBuffer) {
					this.vy += wallForce;
				}
				if (this.y > VIEW_HEIGHT - margin - edgeBuffer) {
					this.vy -= wallForce;
				}

				// 安全バウンド (ぬるりと押し戻す)
				if (this.x < margin) {
					this.x = margin;
					this.vx *= -0.2;
				}
				if (this.x > VIEW_WIDTH - margin) {
					this.x = VIEW_WIDTH - margin;
					this.vx *= -0.2;
				}
				if (this.y < margin) {
					this.y = margin;
					this.vy *= -0.2;
				}
				if (this.y > VIEW_HEIGHT - margin) {
					this.y = VIEW_HEIGHT - margin;
					this.vy *= -0.2;
				}
			}

			drawShape(context) {
				if (this.numPoints < 3) return;

				const points = [];
				for (let i = 0; i < this.numPoints; i++) {
					const angle = (i / this.numPoints) * Math.PI * 2;

					// 形状の変化を極めてマイルドにし、ぷるぷる感を徹底排除します
					const pulse = Math.sin(this.time * 1.0 + angle * 3) * 0.04;
					const wave = Math.cos(this.time * 0.4 - angle * 2) * 0.03;
					const currentVertexR = this.r * (1 + pulse + wave);

					points.push({
						x: this.x + Math.cos(angle) * currentVertexR,
						y: this.y + Math.sin(angle) * currentVertexR
					});
				}

				context.beginPath();
				// 最初の2点の中点から開始
				let xc = (points[0].x + points[1].x) / 2;
				let yc = (points[0].y + points[1].y) / 2;
				context.moveTo(xc, yc);

				// 2次ベジェスプライン曲線で全ての頂点を滑らかに結ぶ
				for (let i = 1; i < this.numPoints - 1; i++) {
					xc = (points[i].x + points[i+1].x) / 2;
					yc = (points[i].y + points[i+1].y) / 2;
					context.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
				}

				// 最後の点と最初の点を結ぶ
				xc = (points[this.numPoints - 1].x + points[0].x) / 2;
				yc = (points[this.numPoints - 1].y + points[0].y) / 2;
				context.quadraticCurveTo(points[this.numPoints - 1].x, points[this.numPoints - 1].y, xc, yc);

				// 最初の開始位置に戻る
				const firstMidX = (points[0].x + points[1].x) / 2;
				const firstMidY = (points[0].y + points[1].y) / 2;
				context.quadraticCurveTo(points[0].x, points[0].y, firstMidX, firstMidY);

				context.closePath();
				context.fill();
			}
		}

		// アメーバ生成
		const blobs = [];
		const numBlobs = 14;

		for (let i = 0; i < numBlobs; i++) {
			const r = 18 + Math.pow(Math.random(), 1.5) * 32;
			const x = r + Math.random() * (VIEW_WIDTH - r * 2);
			const y = r + Math.random() * (VIEW_HEIGHT - r * 2);

			blobs.push(new Amoeba(x, y, r));
		}

		function clampBlobsToView() {
			blobs.forEach(blob => {
				const margin = blob.r * 0.4;

				blob.x = Math.max(margin, Math.min(VIEW_WIDTH - margin, blob.x));
				blob.y = Math.max(margin, Math.min(VIEW_HEIGHT - margin, blob.y));
			});
		}

		window.addEventListener('resize', () => {
			resizeCanvas();
			clampBlobsToView();
		});

		function draw() {
			ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

			// アメーバ本体と同等にマイルドに溶け合えるよう、力場を先に白で描画
			ctx.fillStyle = '#ffffff';
			forceFields.forEach(field => {
				field.draw(ctx);
			});

			// アメーバ本体の描画
			blobs.forEach(blob => {
				blob.drawShape(ctx);
			});

			// タッチした指の存在（不透明度を上げ、アメーバにぬるりと融合するソフトな輪郭を浮かび上がらせます）
			if (pointer.active || pointer.visualRadius > 0.5) {
				ctx.save();
				const grad = ctx.createRadialGradient(
					pointer.x, pointer.y, 0,
					pointer.x, pointer.y, pointer.visualRadius
				);
				const alpha = pointer.active ? 0.85 : (pointer.visualRadius / pointer.visualTargetRadius) * 0.85;
				grad.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
				grad.addColorStop(0.5, `rgba(255, 255, 255, ${alpha * 0.45})`);
				grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

				ctx.beginPath();
				ctx.arc(pointer.x, pointer.y, pointer.visualRadius, 0, Math.PI * 2);
				ctx.fillStyle = grad;
				ctx.fill();
				ctx.restore();
			}
		}

		function loop() {
			if (pointer.active) {
				pointer.vx = pointer.x - pointer.lastX;
				pointer.vy = pointer.y - pointer.lastY;
				pointer.lastX = pointer.x;
				pointer.lastY = pointer.y;
			}

			// 指の表示半径をさらに滑らかに膨張・収縮させます (優しく「すーっ」と宿るように)
			if (pointer.active) {
				pointer.visualRadius += (pointer.visualTargetRadius - pointer.visualRadius) * 0.10; // 0.15 -> 0.10
			} else {
				pointer.visualRadius += (0 - pointer.visualRadius) * 0.08; // 0.12 -> 0.08
			}

			// 力場の更新と削除
			for (let i = forceFields.length - 1; i >= 0; i--) {
				forceFields[i].update();

				if (!forceFields[i].alive) {
					forceFields.splice(i, 1);
				}
			}

			blobs.forEach(blob => blob.update());
			draw();

			requestAnimationFrame(loop);
		}

		function getPointerPos(e) {
			return {
				x: e.clientX * (VIEW_WIDTH / window.innerWidth),
				y: e.clientY * (VIEW_HEIGHT / window.innerHeight)
			};
		}

		canvas.addEventListener('pointerdown', (e) => {
			canvas.setPointerCapture(e.pointerId);

			pointer.active = true;

			const pos = getPointerPos(e);
			pointer.x = pos.x;
			pointer.y = pos.y;
			pointer.lastX = pos.x;
			pointer.lastY = pos.y;
			pointer.vx = 0;
			pointer.vy = 0;

			// 0からゆっくり膨らませることで、急なビジュアルの発生を防ぎます
			pointer.visualRadius = 0;

			const hint = document.getElementById('hint');
			if (hint) hint.style.opacity = '0';
		});

		canvas.addEventListener('pointermove', (e) => {
			if (!pointer.active) return;

			const pos = getPointerPos(e);
			pointer.x = pos.x;
			pointer.y = pos.y;
		});

		canvas.addEventListener('pointerup', (e) => {
			if (!pointer.active) return;

			pointer.active = false;
			canvas.releasePointerCapture(e.pointerId);

			// 離した瞬間のスピードをマイルドにして周囲のアメーバへ伝播 (急加速を防ぐ)
			blobs.forEach(blob => {
				const dx = pointer.x - blob.x;
				const dy = pointer.y - blob.y;
				const dist = Math.hypot(dx, dy);

				if (dist < pointer.radius * 2.5) {
					const influence = 1 - dist / (pointer.radius * 2.5);

					blob.vx += pointer.vx * influence * 0.15;
					blob.vy += pointer.vy * influence * 0.15;
				}
			});

			// スプラッシュ粒子などは一切生成せず、熱源力場のみをゆっくり残します
			forceFields.push(new ForceField(pointer.x, pointer.y, pointer.vx, pointer.vy));

			if (forceFields.length > 5) {
				forceFields.shift();
			}
		});

		canvas.addEventListener('pointercancel', () => {
			pointer.active = false;

			forceFields.push(new ForceField(pointer.x, pointer.y, pointer.vx, pointer.vy));

			if (forceFields.length > 5) {
				forceFields.shift();
			}
		});

		loop();

		setTimeout(() => {
			const hint = document.getElementById('hint');
			if (hint) hint.style.opacity = '0';
		}, 5000);
	</script>

</body>

</html>
